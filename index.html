<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPlayer</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            font-family: 'Segoe UI', sans-serif; 
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .header {
            padding: 20px;
            background: #222;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }
        .header i { color: #00d4ff; font-size: 24px; }
        .header span { font-size: 20px; font-weight: bold; color: #00d4ff; }
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        #mainPlayer {
            width: 100%;
            height: 100%;
        }
        .info-bar {
            padding: 15px 20px;
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .loading {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .error-box {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-secondary { background: #333; color: white; }
        button:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-play-circle"></i>
            <span>ProPlayer</span>
        </div>
        
        <div class="player-wrapper">
            <div id="loadingOverlay" class="loading">
                <div class="spinner"></div>
                <p style="margin-top:15px;color:#aaa;">Cargando reproductor...</p>
            </div>
            
            <div id="errorBox" class="error-box hidden">
                <p style="font-size:40px;margin-bottom:15px;">⚠️</p>
                <h3 style="margin-bottom:10px;">Error al cargar</h3>
                <p id="errorMsg" style="color:#aaa;margin-bottom:20px;"></p>
                <button onclick="location.reload()" class="btn-primary">Reintentar</button>
                <button onclick="useFallback()" class="btn-secondary">Modo alternativo</button>
            </div>
            
            <video id="mainPlayer" class="video-js vjs-default-skin" controls playsinline></video>
            <iframe id="fallbackFrame" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe>
        </div>
        
        <div class="info-bar">
            <div class="status">
                <div class="dot"></div>
                <span id="statusText">Conectando...</span>
            </div>
            <span id="modeText" style="color:#00d4ff;"></span>
        </div>
    </div>
    
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    
    <script>
        const TARGET_URL = 'https://vibuxer.com/e/83kqfqtghrdx';
        let player = null;
        
        async function init() {
            try {
                // Intentar extraer stream via proxy
                const response = await fetch('api/proxy.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: TARGET_URL})
                });
                
                const data = await response.json();
                
                if (data.success && data.streamUrl) {
                    setupPlayer(data.streamUrl);
                } else {
                    throw new Error(data.error || 'No se encontró stream');
                }
            } catch (error) {
                console.log('Usando iframe fallback...');
                useFallback();
            }
        }
        
        function setupPlayer(streamUrl) {
            document.getElementById('loadingOverlay').classList.add('hidden');
            
            const videoEl = document.getElementById('mainPlayer');
            player = videojs('mainPlayer', {
                controls: true,
                autoplay: true,
                preload: 'auto',
                fluid: true
            });
            
            if (streamUrl.includes('.m3u8') && Hls.isSupported()) {
                const hls = new Hls({ enableWorker: false });
                hls.loadSource(streamUrl);
                hls.attachMedia(videoEl);
            } else {
                player.src({src: streamUrl, type: 'application/x-mpegURL'});
            }
            
            player.on('playing', () => {
                document.getElementById('statusText').textContent = 'Reproduciendo';
                document.getElementById('modeText').textContent = 'Stream Directo';
            });
            
            player.on('error', () => {
                showError('Error de reproducción');
            });
        }
        
        function useFallback() {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('mainPlayer').classList.add('hidden');
            
            const iframe = document.getElementById('fallbackFrame');
            iframe.src = TARGET_URL;
            iframe.classList.remove('hidden');
            
            document.getElementById('statusText').textContent = 'Reproduciendo';
            document.getElementById('modeText').textContent = 'Modo iFrame';
            
            if (player) player.dispose();
        }
        
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorBox').classList.remove('hidden');
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
